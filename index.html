<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Cek Aset SSB</title>
    <style>
        /* Desain Sangat Ramah Lansia: Kontras Tinggi, Font Super Besar, Garis Jelas */
        :root {
            --primary: #1e3a8a;
            --success: #14532d;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #64748b;
            --text: #000000;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 15px 10px;
            margin: 0;
            line-height: 1.5;
            font-size: 20px;
        }
        
        .container {
            max-width: 650px;
            margin: 0 auto;
            padding-bottom: 40px;
        }
        
        h2 {
            text-align: center;
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 30px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        .card {
            background: var(--card);
            padding: 25px 20px;
            border-radius: 16px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
            border: 2px solid #cbd5e1;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 800;
            font-size: 1.3rem;
            color: #000000;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 18px;
            border: 3px solid var(--border);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1.2rem;
            background-color: #ffffff;
            color: #000000;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2563eb;
            background-color: #eff6ff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
        }
        
        .time-row {
            display: flex;
            gap: 15px;
        }
        
        .time-col {
            flex: 1;
        }
        
        .pos-section {
            border: 3px solid var(--primary);
            margin-bottom: 35px;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .pos-title {
            font-weight: 900;
            font-size: 1.5rem;
            margin-top: -35px;
            margin-bottom: 20px;
            background-color: var(--primary);
            color: white;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 30px;
            text-transform: uppercase;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }
        
        button {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 16px;
            font-weight: 900;
            cursor: pointer;
            font-size: 1.4rem;
            color: white;
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.15);
            text-transform: uppercase;
        }
        
        button:active {
            transform: scale(0.96);
        }
        
        .btn-generate {
            background-color: #2563eb;
            border: 3px solid #1e3a8a;
        }
        
        .btn-wa {
            background-color: #16a34a;
            border: 3px solid #14532d;
            margin-top: 10px;
        }
        
        textarea#hasilLaporan {
            height: 250px;
            resize: vertical;
            background-color: #f1f5f9;
            font-family: monospace;
            font-size: 1.2rem;
            margin-top: 20px;
            border: 3px dashed var(--primary);
        }
        
        .help-text {
            font-size: 1.1rem;
            color: #334155;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 FORM CEK ASET SSB</h2>

    <div class="card">
        <div class="form-group">
            <label>📅 Bulan & Tahun</label>
            <span class="help-text">Ketuk untuk memilih bulan dan tahun:</span>
            <input type="month" id="bulan" value="2026-04">
        </div>
        <div class="form-group">
            <label>📆 Tanggal Pengecekan</label>
            <span class="help-text">Ketuk ikon kalender untuk memilih tanggal:</span>
            <input type="date" id="tanggal">
        </div>
    </div>

    <div id="posContainer"></div>

    <div class="card">
        <div class="button-group">
            <button class="btn-generate" onclick="generateReport()">⬇️ 1. BUAT LAPORAN ⬇️</button>
        </div>
        
        <textarea id="hasilLaporan" readonly placeholder="Hasil teks akan muncul di sini otomatis setelah tombol BUAT LAPORAN ditekan..."></textarea>
        
        <div class="button-group">
            <button class="btn-wa" onclick="salinLaporan()">✅ 2. SALIN HASIL LAPORAN</button>
        </div>
    </div>
</div>

<script>
    const posContainer = document.getElementById('posContainer');
    let posHTML = '';
    
    for (let i = 1; i <= 5; i++) {
        posHTML += `
        <div class="pos-section">
            <div class="pos-title">📌 POS ${i}</div>
            
            <div class="form-group">
                <label>⏰ Pilih Waktu (Jam)</label>
                <div class="time-row">
                    <div class="time-col">
                        <span class="help-text">Jam Mulai:</span>
                        <input type="time" id="jamMulai${i}">
                    </div>
                    <div class="time-col">
                        <span class="help-text">Jam Selesai:</span>
                        <input type="time" id="jamSelesai${i}">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>👮‍♂️ Nama Petugas</label>
                <input type="text" id="petugas${i}" placeholder="Ketik nama petugas...">
            </div>

            <div class="form-group">
                <label>🔍 Status Pemeriksaan</label>
                <select id="status${i}">
                    <option value="👍">👍 AMAN</option>
                    <option value="❗">❗ ADA TEMUAN</option>
                </select>
            </div>
        </div>
        `;
    }
    posContainer.innerHTML = posHTML;

    // Fungsi untuk merapikan format Bulan Tahun
    function formatBulan(val) {
        if (!val) return '...';
        const namaBulan = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
        const parts = val.split('-');
        const tahun = parts[0];
        const bulanIndex = parseInt(parts[1]) - 1;
        return `${namaBulan[bulanIndex]} ${tahun}`;
    }

    // Fungsi untuk merapikan format Tanggal
    function formatTanggal(val) {
        if (!val) return '...';
        const namaBulanKecil = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const parts = val.split('-');
        const hari = parseInt(parts[2]);
        const bulanIndex = parseInt(parts[1]) - 1;
        return `${hari} ${namaBulanKecil[bulanIndex]}`;
    }

    function generateReport() {
        // Ambil data mentah dari input kalender
        const rawBulan = document.getElementById('bulan').value;
        const rawTanggal = document.getElementById('tanggal').value;
        
        // Ubah formatnya ke teks yang rapi (Contoh: "APRIL 2026" dan "8 April")
        const bulan = formatBulan(rawBulan);
        const tanggal = formatTanggal(rawTanggal);
        
        let teksLaporan = `*Lap Cek Aset SSB*\n${bulan} (1x per pekan)\n\n`;

        for (let i = 1; i <= 5; i++) {
            const jMulai = document.getElementById(`jamMulai${i}`).value || '...';
            const jSelesai = document.getElementById(`jamSelesai${i}`).value || '...';
            const petugas = document.getElementById(`petugas${i}`).value || '...';
            const status = document.getElementById(`status${i}`).value;

            const jamGabung = `${jMulai}-${jSelesai}`;

            teksLaporan += `${i}.Pos ${i} = ${status}\n`;
            teksLaporan += `${tanggal}, ${jamGabung}, ${petugas}\n\n`; 
        }

        teksLaporan += `👍 : Aman\n❗: Ada Temuan`;

        document.getElementById('hasilLaporan').value = teksLaporan.trim();
    }

    function salinLaporan() {
        const laporan = document.getElementById('hasilLaporan').value;
        if (!laporan) {
            alert('Silakan tekan tombol 1. BUAT LAPORAN terlebih dahulu!');
            return;
        }

        // Karena copy to clipboard di browser kadang diblokir, ini solusinya
        const textarea = document.createElement('textarea');
        textarea.value = laporan;
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            alert('✅ Teks berhasil disalin! Silakan buka WhatsApp dan tempel (paste) pesannya.');
        } catch (err) {
            alert('Gagal menyalin teks otomatis, silakan salin manual dari kotak teks.');
        }
        document.body.removeChild(textarea);
    }
</script>

</body>
</html>
